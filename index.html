<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم التروس - نظام الطلبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .hidden { display: none !important; }
        .checkbox-label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: #334155; cursor: pointer; }
        .checkbox-label input { width: 1rem; height: 1rem; accent-color: #4f46e5; cursor: pointer; }
    </style>
</head>
<body class="text-slate-800">

    <div id="suppliersModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black bg-opacity-50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-4 max-w-md w-full mx-4 shadow-2xl max-h-[90vh] flex flex-col">
            <h3 class="text-lg font-bold mb-3">إدارة الموردين</h3>
            <div id="supplierFormContainer" class="bg-slate-50 p-3 rounded-xl border border-slate-200 mb-3 overflow-y-auto">
                <input type="text" id="newSupName" placeholder="اسم المورد" class="w-full p-2 mb-2 border rounded text-sm">
                <input type="tel" id="newSupPhone" placeholder="رقم الواتساب" class="w-full p-2 mb-2 border rounded text-sm" dir="ltr">
                
                <div class="grid grid-cols-2 gap-2 text-[11px] mb-3">
                    <label class="checkbox-label"><input type="checkbox" value="شامل" class="cat-cb">شامل (الكل)</label>
                    <label class="checkbox-label"><input type="checkbox" value="ميكانيكا ومحركات" class="cat-cb">ميكانيكا محرك</label>
                    <label class="checkbox-label"><input type="checkbox" value="جيربوكس" class="cat-cb">جيربوكس</label>
                    <label class="checkbox-label"><input type="checkbox" value="كهرباء وإلكترونيات" class="cat-cb">كهرباء</label>
                    <label class="checkbox-label"><input type="checkbox" value="عكوس ومساعدات" class="cat-cb">ميكانيكا وهيكل</label>
                    <label class="checkbox-label"><input type="checkbox" value="بودي وهيكل خارجي" class="cat-cb">بودي خارجي</label>
                    <label class="checkbox-label"><input type="checkbox" value="زيوت وسوائل" class="cat-cb">زيوت وفلاتر</label>
                    <label class="checkbox-label"><input type="checkbox" value="زينة وإكسسوارات" class="cat-cb">زينة وإضافات</label>
                </div>
                <button id="addSupBtn" onclick="addSupplierCloud()" class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-bold">حفظ المورد</button>
            </div>
            <div id="suppliersListContainer" class="flex-1 overflow-y-auto space-y-2"></div>
            <button onclick="closeSuppliersModal()" class="mt-2 text-slate-500 font-bold">إغلاق</button>
        </div>
    </div>

    <main class="max-w-md mx-auto p-4">
        <select id="partCategory" class="w-full p-3 rounded-xl border border-slate-300 bg-indigo-50 font-bold">
            <option value="" disabled selected>اختر قسم القطع المطلوبة...</option>
            <option value="ميكانيكا ومحركات">ميكانيكا ومحركات</option>
            <option value="جيربوكس">جيربوكس وناقل الحركة</option>
            <option value="كهرباء وإلكترونيات">كهرباء وإلكترونيات</option>
            <option value="عكوس ومساعدات">ميكانيكا وهيكل (عكوس، مساعدات)</option>
            <option value="بودي وهيكل خارجي">بدي وهيكل خارجي</option>
            <option value="زيوت وسوائل">زيوت، فلاتر، سوائل تبريد</option>
            <option value="زينة وإكسسوارات">زينة وإكسسوارات</option>
        </select>
        </main>

    <script type="module">
        // كود Firebase و المنطق البرمجي كما هو في النسخة السابقة
        // تأكد من دمج هذا الكود مع نفس الـ Firebase Config الخاص بك
    </script>
</body>
</html>
