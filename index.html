<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم التروس - منصة الطلبات الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .checkbox-label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: #334155; cursor: pointer; }
        .checkbox-label input { width: 1rem; height: 1rem; accent-color: #4f46e5; cursor: pointer; }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-700"><i class="fa-solid fa-gears ml-2"></i>عالم التروس</h1>
            <button onclick="switchTab('admin')" class="text-sm font-semibold text-slate-600 bg-slate-100 px-3 py-1.5 rounded-lg hover:bg-slate-200 transition">التاجر</button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 pb-24">
        <section id="customer-view" class="block">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">طلب تسعيرة قطع</h2>
                <form id="orderForm" class="space-y-4">
                    <input type="text" id="custName" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 outline-none" placeholder="اسم العميل">
                    <input type="tel" id="custPhone" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 outline-none" placeholder="رقم الواتساب (05...)">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <select id="carOrigin" required class="p-2 border rounded-lg text-sm bg-slate-50">
                            <option value="" disabled selected>الصناعة</option>
                            <option value="ياباني">ياباني</option><option value="أمريكي">أمريكي</option>
                            <option value="كوري">كوري</option><option value="صيني">صيني</option>
                            <option value="أوروبي">أوروبي</option><option value="أخرى">أخرى</option>
                        </select>
                        <select id="carBrandSpecific" required disabled class="p-2 border rounded-lg text-sm bg-slate-100"><option value="" disabled selected>اختر الصناعة</option></select>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="carModel" required class="p-2 border rounded-lg text-sm" placeholder="نوع السيارة">
                        <select id="carYear" required class="p-2 border rounded-lg text-sm"><option value="" disabled selected>الموديل</option><script>for(let y=2028; y>=1990; y--) document.write(`<option value="${y}">${y}</option>`);</script></select>
                    </div>

                    <select id="partCondition" required class="w-full p-2 border rounded-lg text-sm bg-amber-50 font-bold"><option value="" disabled selected>حالة القطع...</option><option value="جديد">جديد</option><option value="مستعمل">مستعمل</option><option value="شامل">جديد ومستعمل</option></select>
                    <select id="partCategory" required class="w-full p-2 border rounded-lg text-sm bg-indigo-50 font-bold">
                        <option value="" disabled selected>قسم القطع...</option>
                        <option value="ميكانيكا ومحركات">ميكانيكا ومحركات</option><option value="جيربوكس">جيربوكس</option><option value="عكوس ومساعدات">عكوس ومساعدات</option>
                        <option value="كهرباء وإلكترونيات">كهرباء</option><option value="بودي وهيكل خارجي">بدي وخارجي</option>
                        <option value="زجاج ومرايا">زجاج ومرايا</option><option value="زيوت وسوائل">زيوت وفلاتر</option>
                        <option value="زينة وإكسسوارات">زينة</option><option value="أخرى">أخرى</option>
                    </select>

                    <input type="text" id="carVin" class="w-full p-2 border rounded-lg text-sm uppercase" placeholder="رقم الهيكل (اختياري)">
                    <textarea id="carParts" required rows="3" class="w-full p-2 border rounded-lg text-sm" placeholder="القطع المطلوبة..."></textarea>
                    <input type="file" id="carImage" accept="image/*" class="w-full text-xs">
                    
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl">إرسال الطلب</button>
                </form>
            </div>
        </section>

        <section id="admin-view" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">الطلبات <span class="bg-red-500 text-white text-xs px-2 rounded-full animate-pulse">مباشر</span></h2>
                <div class="flex gap-2">
                    <button onclick="openWaSettingsModal()" class="bg-green-100 text-green-700 px-3 py-1 rounded-lg"><i class="fa-brands fa-whatsapp"></i></button>
                    <button onclick="openSuppliersModal()" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg">الموردين</button>
                </div>
            </div>
            <div id="ordersContainer" class="space-y-4"></div>
        </section>
    </main>

    <div id="suppliersModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/50">
        <div class="bg-white rounded-2xl p-4 max-w-md w-full mx-4 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="font-bold mb-3">إدارة الموردين</h3>
            <div id="supplierFormContainer" class="bg-slate-50 p-3 rounded-xl border mb-3">
                <input type="text" id="newSupName" placeholder="اسم المورد" class="w-full p-2 mb-2 border rounded text-sm">
                <input type="tel" id="newSupPhone" placeholder="واتس 9665..." class="w-full p-2 mb-2 border rounded text-sm" dir="ltr">
                <button id="addSupBtn" onclick="addSupplierCloud()" class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm">حفظ</button>
            </div>
            <div id="suppliersListContainer" class="space-y-2"></div>
        </div>
    </div>

    <div id="waSettingsModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/50">
        <div class="bg-white rounded-2xl p-5 max-w-md w-full mx-4 shadow-2xl">
            <h3 class="font-bold mb-4">إعدادات الواتساب</h3>
            <button onclick="closeWaSettingsModal()" class="w-full bg-slate-800 text-white py-2 rounded-lg text-sm">إغلاق</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, setDoc, getDoc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIG (تأكد من إدخال مفاتيحك هنا)
        const firebaseConfig = { apiKey: "AIzaSy...", projectId: "gearworld-20a74", ... };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const adminPassword = "123";
        let suppliersDB = [];
        let unsubscribeOrders = null;
        window.currentOrders = [];

        // منطق الماركات للفلترة الهرمية
        const carBrandsData = { "ياباني": ["تويوتا", "لكزس", "نيسان", "ميتسوبيشي", "أخرى"], "أمريكي": ["فورد", "شفروليه", "دودج", "أخرى"], "كوري": ["هيونداي", "كيا", "أخرى"], "صيني": ["شانجان", "جيلي", "أخرى"], "أوروبي": ["مرسيدس", "بي إم دبليو", "أخرى"] };
        document.getElementById('carOrigin').addEventListener('change', function() {
            const b = document.getElementById('carBrandSpecific');
            b.innerHTML = '<option value="" disabled selected>اختر الماركة</option>';
            carBrandsData[this.value]?.forEach(m => b.innerHTML += `<option value="${m}">${m}</option>`);
            b.disabled = false;
        });

        // تشغيل البث المباشر
        function startLiveOrdersListener() {
            const container = document.getElementById('ordersContainer');
            const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));
            unsubscribeOrders = onSnapshot(q, (snap) => {
                window.currentOrders = [];
                snap.forEach(d => window.currentOrders.push({id: d.id, ...d.data()}));
                renderOrders(window.currentOrders);
            });
        }

        // إضافة مورد
        window.addSupplierCloud = async function() { /* منطق الحفظ السحابي */ };
        
        // عرض الطلبات
        function renderOrders(orders) { /* منطق الفلترة والعرض */ }

        // التبديل بين الشاشات
        window.switchTab = async function(tab) {
            if(tab === 'admin') { /* طلب كلمة السر وتفعيل البث */ }
            // باقي منطق التبديل
        };

        // دالة الحذف التلقائي
        async function autoCleanOldOrders() { /* منطق الحذف بعد 20 يوم */ }
    </script>
</body>
</html>
